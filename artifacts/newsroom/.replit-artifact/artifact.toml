kind = "web"
previewPath = "/"
title = "Personal AI Newsroom"
version = "1.0.0"
id = "artifacts/newsroom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23519

[services.development]
run = "pnpm --filter @workspace/newsroom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/newsroom", "run", "build" ]
publicDir = "artifacts/newsroom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23519"
BASE_PATH = "/"
