openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Personal AI Newsroom API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: topics
    description: Available news topics
  - name: news
    description: News collection and AI summarization
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /topics:
    get:
      operationId: getTopics
      tags: [topics]
      summary: List available news topics
      description: Returns all topics the user can select for news summarization
      responses:
        "200":
          description: List of topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"

  /news/summarize:
    post:
      operationId: summarizeNews
      tags: [news]
      summary: Collect news and generate Thai AI summary
      description: Fetches real news articles for the given topic and summarizes them in Thai using the configured AI provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeInput"
      responses:
        "200":
          description: Thai language news summary with sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsSummary"
        "400":
          description: Invalid topic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: AI or news collection error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Topic:
      type: object
      required:
        - id
        - label
        - labelTh
        - icon
      properties:
        id:
          type: string
          description: Unique topic identifier
          example: ai
        label:
          type: string
          description: English topic label
          example: Artificial Intelligence
        labelTh:
          type: string
          description: Thai topic label
          example: ปัญญาประดิษฐ์
        icon:
          type: string
          description: Emoji icon for the topic
          example: "🤖"

    Article:
      type: object
      required:
        - title
        - url
      properties:
        title:
          type: string
        url:
          type: string
        description:
          type: ["string", "null"]
        pubDate:
          type: ["string", "null"]
        source:
          type: ["string", "null"]

    SummarizeInput:
      type: object
      required:
        - topicId
      properties:
        topicId:
          type: string
          description: Topic ID from GET /topics
          example: ai

    NewsSummary:
      type: object
      required:
        - topic
        - summary
        - sources
        - generatedAt
        - generationTimeMs
        - provider
        - articleCount
      properties:
        topic:
          $ref: "#/components/schemas/Topic"
        summary:
          type: string
          description: Thai-language AI-generated summary
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        generatedAt:
          type: string
          description: ISO 8601 timestamp
        generationTimeMs:
          type: number
          description: Time taken to generate summary in milliseconds
        provider:
          type: string
          description: AI provider used (github, openai, gemini)
        articleCount:
          type: number
          description: Number of articles collected

    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
